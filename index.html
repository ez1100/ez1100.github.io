<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Game Make Test List</title>
    <style>
        /* 기본 스타일 초기화 및 폰트 설정 */
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f8f9fa;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            width: 90%;
            background: #ffffff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #222;
        }

        /* 사이트 이전 안내 멘트 영역 */
        .notice-box {
            background-color: #e9ecef;
            border-left: 5px solid #007bff;
            padding: 15px;
            margin: 25px 0;
            border-radius: 4px;
            text-align: left;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .notice-box strong {
            color: #007bff;
        }

        /* 게임 링크 스타일 */
        .game-list {
            margin-top: 30px;
        }

        .game-item {
            display: block;
            background: #ffffff;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            text-decoration: none;
            color: #333;
            text-align: left;
            transition: all 0.2s ease;
        }

        .game-item:hover {
            border-color: #007bff;
            transform: translateY(-3px);
            box-shadow: 0 4px 10px rgba(0,123,255,0.15);
        }

        .game-item h3 {
            margin: 0 0 8px 0;
            font-size: 1.2rem;
            color: #111;
        }

        .game-item p {
            margin: 0;
            font-size: 0.9rem;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎮 Game Portfolio</h1>
        
        <div class="notice-box">
            <strong>📢 사이트 리뉴얼 및 이전 안내</strong><br>
            기존에 메인 화면에서 제공되던 게임 콘텐츠들이 개별 프로젝트 페이지로 새롭게 이전되었습니다. 앞으로 추가될 신작 게임들도 아래 목록에서 간편하게 선택하여 플레이하실 수 있습니다.
        </div>

        <div class="game-list">
            <a href="https://ez1100.github.io/Yatch.html" class="game-item">
                <h3>🎲 요트 다이스 (Yatch Dice)</h3>
                <p>브라우저에서 바로 즐길 수 있는 주사위 보드게임입니다. 주소창에 /Yatch를 붙여 바로 접속하실 수도 있습니다.</p>
            </a>

            <a href="#" class="game-item" onclick="alert('현재 열심히 개발 중입니다! 조금만 기다려주세요 🚀'); return false;">
                <h3>🚀 Next Project (준비 중)</h3>
                <p>AI를 활용해 제작 중인 두 번째 신작 게임입니다. 곧 공개됩니다!</p>
            </a>
        </div>
    </div>

</body>
</html>
